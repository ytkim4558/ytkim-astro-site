    "windows-terminal-crash-fix": {
        "title": "Windows Terminal이 열리자마자 죽을 때 — DCOM 10010 에러와 재설치로 해결",
            "author": "ytkim4558",
            "category": "",
            "content": "Windows 11에서 Windows Terminal이 실행 직후 조용히 종료되는 문제를 겪었다. 마우스 포인터에 로딩 원이 잠깐 돌다가 사라지고, 창은 열리지 않는다. PowerShell도 기본 터미널이 WT로 설정돼 있어서 같이 안 열렸다.증상  시작 메뉴에서 PowerShell / Terminal 클릭 → 로딩 커서만 잠깐 뜨고 사라짐  Win+R → wt → 동일 증상  이벤트 뷰어 System 로그에 Event ID 10010 반복:    The server {E12CFF52-A866-4C77-9A90-F570A7AA2C6B} did not register with DCOM within the required timeout.        Start-Process wt -PassThru 실행 시 프로세스가 exit code 0으로 즉시 종료 (크래시가 아닌 정상 종료 코드)원인{E12CFF52-A866-4C77-9A90-F570A7AA2C6B}는 Windows Terminal의 DelegationTerminal CLSID다. WT가 DCOM에 제대로 등록되지 못해 시스템이 타임아웃을 발생시킨 것.직접적 원인은 settings.json에 유효하지 않은 값이 들어간 것이었다:\"rendering.graphicsAPI\": \"software\"WT가 허용하는 값은 automatic | direct2d | direct3d11뿐이다. 잘못된 값이 들어가면 WT는 설정 파싱 단계에서 실패하고 조용히 종료한다.시도한 것들 (효과 없음)            시도      결과                  chcp 65001      폰트 깨짐과 무관              settings.json에서 잘못된 키 제거      여전히 안 열림              Reset-AppxPackage      여전히 안 열림              state.json 삭제      여전히 안 열림      해결: 완전 재설치# 1. 제거Get-AppxPackage Microsoft.WindowsTerminal | Remove-AppxPackage# 2. 재등록Add-AppxPackage -RegisterByFamilyName -MainPackage Microsoft.WindowsTerminal_8wekyb3d8bbwe재설치 후 정상 실행 확인.임시 우회: 기본 터미널을 conhost로 변경WT가 안 열리는 동안 PowerShell을 쓰려면 기본 터미널을 Windows Console Host로 변경한다:$reg = \"HKCU:\\SOFTWARE\\Microsoft\\Windows\\CurrentVersion\\Explorer\\Advanced\"Set-ItemProperty $reg -Name 'DelegationConsole' -Value '{2EACA947-7F5F-4CFA-BA87-8F7FBEEFBE69}'Set-ItemProperty $reg -Name 'DelegationTerminal' -Value '{2EACA947-7F5F-4CFA-BA87-8F7FBEEFBE69}'복원할 때:Set-ItemProperty $reg -Name 'DelegationConsole' -Value '{2EACA947-7F5F-4CFA-BA87-8F7FBEEFBE69}'Set-ItemProperty $reg -Name 'DelegationTerminal' -Value '{E12CFF52-A866-4C77-9A90-F570A7AA2C6B}'교훈  WT의 settings.json에 유효하지 않은 값을 넣으면 에러 팝업 한 번 보여주고 기본 설정으로 폴백하는 게 아니라, 상황에 따라 아예 실행이 안 될 수 있다.  Reset-AppxPackage로 부족하면 Remove → Add로 완전 재설치해야 한다.  DCOM 10010 에러에서 CLSID가 {E12CFF52-...}이면 Windows Terminal 문제를 의심할 것.환경  Windows 11 Pro 25H2  Windows Terminal 1.24.11321.0  NVIDIA RTX 5090, 드라이버 596.49",
        "url": "/windows-terminal-crash-fix"
    }

    "adaptive-mobile-layout-handoff": {
        "title": "GitHub Pages 포트폴리오 모바일 레이아웃을 적응형으로 정리한 이유",
            "author": "ytkim4558",
            "category": "",
            "content": "ytkim4558.github.io의 포트폴리오와 AI Workflow 글 상세 페이지를 보다가 상단 레이아웃이 서로 맞지 않는 문제가 드러났다.문제는 단순히 이미지가 마음에 들지 않는 수준이 아니었다. /en/portfolio/는 큰 포트폴리오 히어로와 별도의 cover 이미지가 겹쳐 보였고, /linkedin-api-permission-check 같은 글 상세 페이지는 상단에 비어 보이는 영역이 생겼다. /tag/ai-workflow/는 또 다른 방식으로 큰 헤더와 카드 목록이 이어져 전체 사이트가 한 벌의 UI처럼 보이지 않았다.처음 놓친 것처음에는 CSS 몇 줄로 상단 여백과 cover 이미지를 줄이면 된다고 봤다.하지만 그 접근은 부족했다.  공개 URL은 로컬 수정만으로 바뀌지 않는다.  이 블로그는 GitHubPageMaker 소스 repo와 ytkim4558.github.io 배포 repo가 분리되어 있다.  정식 반영은 Docker 기반 Jekyll build 후 output/을 배포 repo로 복사해야 한다.  기존 repo에는 이미 “다른 AI 에이전트에게 남기는 메모”와 cross-agent handoff 규칙이 있었다.특히 4번을 바로 찾지 못한 것이 이번 작업의 핵심 실수였다.AGENTS.md만 보고 멈추지 말고, _posts/와 git history에서 기존 인수인계 패턴을 먼저 검색했어야 했다.반응형과 적응형 중 무엇을 골랐나처음에는 일반적인 반응형 수정을 생각했다.하지만 이 사이트는 이미 Jasper2 기반 데스크톱 레이아웃 위에 포트폴리오 히어로, 태그 페이지, 글 상세 스타일이 여러 겹 쌓인 상태였다.단순 반응형은 하나의 레이아웃을 유동적으로 줄이는 방식에 가깝다.반면 적응형은 특정 화면 폭에서 별도 레이아웃을 주는 방식에 가깝다.이 사이트에는 둘을 섞는 방식이 맞다.  본문, 이미지, 카드 목록은 반응형으로 둔다.  글 상세 상단, 태그 상단, 포트폴리오 히어로는 모바일에서 적응형 레이아웃처럼 따로 잡는다.검색으로도 이 판단을 보강했다.  web.dev Responsive web design basics는 모바일 페이지에 viewport meta가 필요하고, viewport보다 넓은 콘텐츠가 가로 스크롤을 만들면 나쁜 사용자 경험이라고 설명한다.  web.dev Learn Design introduction은 adaptive layout을 media query와 fixed-width layout의 조합으로, responsive design을 media query와 liquid layout의 조합으로 설명한다.  MDN CSS media queries는 viewport size 기준 media query가 서로 다른 화면 크기에 다른 레이아웃을 주는 핵심 도구라고 설명한다.그래서 최종 선택은 “모바일 적응형 레이어를 가진 반응형 사이트”다.실제 수정 방향_layouts/default.html에는 이미 다음 viewport meta가 있었다.&lt;meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\" /&gt;따라서 기기의 가로폭을 읽는 기본 설정은 있었다.문제는 CSS였다. 데스크톱 기준의 큰 width, hero, title 규칙이 모바일에서도 남아 있었다.수정은 다음 방향으로 진행했다.  @media (max-width: 600px)를 모바일 적응형 구간으로 본다.  .post-full-header, .post-full-image, .post-full-content, .portfolio-hero, .portfolio-metrics, .portfolio-toc는 데스크톱 부모 폭을 상속하지 않게 한다.  모바일에서는 주요 블록을 calc(100vw - ...) 기준으로 viewport 안에 고정한다.  긴 한국어/영문 혼합 제목은 모바일에서 더 작은 고정 크기와 줄바꿈 규칙을 사용한다.  포트폴리오 페이지는 자체 hero가 있으므로 generic page cover figure와 Portfolio 중복 제목을 숨긴다.빌드와 확인Docker Desktop은 설치되어 있었지만 처음에는 docker-desktop WSL 배포판이 stopped 상태였다.그래서 Docker Desktop을 실행한 뒤 docker info가 성공하는 것을 확인하고, Ruby 3.2 컨테이너로 Jekyll build를 돌렸다.docker run --rm `  -v jekyll_bundle_232_ruby32_bundler269:/usr/local/bundle `  -v \"C:\\Users\\ytkim\\projects\\GitHubPageMaker:/srv/jekyll\" `  -w /srv/jekyll `  ruby:3.2 `  bash -lc \"bundle _2.6.9_ exec jekyll build --future\"빌드 후 output/을 C:\\Users\\ytkim\\projects\\ytkim4558.github.io로 복사했다.검증은 Chrome headless 캡처로 진행했다.  http://127.0.0.1:8008/linkedin-api-permission-check.html  http://127.0.0.1:8008/en/portfolio/  http://127.0.0.1:8008/tag/ai-workflow/규칙으로 남긴 것이번 작업에서 중요한 것은 CSS 자체보다 다음 규칙이다.  공개 GitHub Pages URL을 보고 “안 바뀐다”고 판단하지 않는다. 로컬 수정, build output, 배포 repo, 원격 GitHub Pages는 서로 다른 상태다.  UI/배포/빌드 의사결정이 생기면 AGENTS.md만 보지 말고 _posts/와 git history의 기존 인수인계 패턴을 검색한다.  사용자가 “왜 이 선택을 했는지 기록하라”고 말하기 전에, 비슷한 작업이면 AI Workflow 글 또는 handoff block을 먼저 제안한다.  이 규칙은 공개 repo 전반에 적용한다.  사용자가 중간에 새 지시를 해도 진행 중이던 build, copy, verification, cleanup 단계를 버리지 않는다. 새 지시는 작업 큐에 끼워 넣고, 끊긴 단계는 다시 이어간다.다른 AI 에이전트에게 남기는 메모이 작업을 이어받는 AI 에이전트는 이 사이트를 단순한 반응형 CSS 문제로 보지 말고, 소스 repo와 배포 repo가 분리된 Jekyll 정적 사이트의 모바일 적응형 레이아웃 작업으로 봐야 한다.  소스 repo: C:\\Users\\ytkim\\projects\\GitHubPageMaker  배포 repo: C:\\Users\\ytkim\\projects\\ytkim4558.github.io  모바일 레이아웃 최종 오버라이드는 assets/css/screen.edited.css와 assets/built/screen.edited.css 둘 다에 있어야 한다.  build는 Docker Ruby 3.2와 Bundler 2.6.9 기준으로 한다.  Docker가 실패하면 먼저 Docker Desktop이 켜져 있는지와 docker info를 확인한다.  공개 URL은 commit/push 후 GitHub Pages 반영까지 시간이 걸릴 수 있다.  다음에 비슷한 의사결정이 생기면 먼저 rg -n \"인수인계|handoff|다른 AI 에이전트|Cross-Agent|AI Workflow\" .와 git log --all --grep=handoff --grep=인수인계 --grep=agent --oneline --decorate --max-count=30를 실행한다.",
        "url": "/adaptive-mobile-layout-handoff"
    }

            "author": "ytkim4558",
            "category": "",
            "content": "LinkedIn에 새 글을 올리기 전에 기존에 내가 썼던 글의 톤을 보고 맞추고 싶었다.처음에는 GitHub API처럼 OAuth만 연결하면 내 게시글도 바로 읽을 수 있을 것이라고 생각했다.하지만 직접 LinkedIn Developer 앱을 만들고 OAuth를 붙여보니, 결론은 조금 달랐다.목표목표는 단순했다.  LinkedIn Developer 앱 생성  OAuth로 본인 계정 인증  기존 게시글 조회  기존 글의 문장 길이, 말투, 한영 병기 방식, 해시태그 사용 방식을 분석  새 LinkedIn 포스트 초안을 그 톤에 맞게 작성이미 linkedin-posting-mcp라는 로컬 MCP 서버를 만들어둔 상태였기 때문에,여기에 게시글 조회 도구를 추가해 실제로 가능한지 확인했다.구현한 것linkedin-posting-mcp에 다음 기능을 추가했다.  linkedin_get_my_posts MCP tool  auth:url:signin: openid profile email만 요청하는 최소 로그인 테스트  auth:url: openid profile email w_member_social 요청  auth:url:read: r_member_social까지 포함해 기존 게시글 조회 가능성 테스트  posts:me: 인증된 사용자의 최근 게시글 조회 테스트조회 요청은 LinkedIn Posts API의 author finder 형태로 구성했다.GET /rest/posts?author=urn:li:person:{member_id}&amp;q=author실제로 확인한 흐름먼저 LinkedIn Developer 앱을 만들었다.앱 생성에는 연결할 LinkedIn Page가 필요했고, 개인 기술 노트용으로 Yongtak Engineering Notes 페이지를 만들었다.이 과정에서 생각보다 많은 작은 판단이 필요했다.중간에 헷갈렸던 지점들첫 번째는 LinkedIn Page 종류였다.처음에는 앱 생성 화면에서 Create a new LinkedIn Page를 눌렀고, linkedin.com/showcase/ 형태의 페이지 생성 화면으로 들어갔다.하지만 Showcase page는 기존 회사 페이지의 하위 페이지라서 연결된 단체 페이지가 필수였다.개인 개발자 앱 연결용으로는 맞지 않았다.결국 LinkedIn 페이지 만들기 화면에서 회사 유형을 골라 일반 Company Page를 만들었다.판단 기준은 단순했다.  linkedin.com/showcase/가 보이면 하위 브랜드/쇼케이스 페이지라서 이번 목적과 맞지 않다.  linkedin.com/company/가 보이면 Developer App에 연결할 일반 페이지로 쓸 수 있다.두 번째는 앱 이름이었다.처음 생각한 이름은 Yongtak LinkedIn Workflow였지만, LinkedIn Developer 앱 이름에는 LinkedIn이라는 단어를 넣을 수 없었다.그래서 앱 이름은 Yongtak AI Workflow처럼 바꿔야 했다.세 번째는 회사 페이지 약관 체크였다.화면에는 “회사 페이지의 공식 담당자로서 회사를 대표해서 회사 페이지를 관리할 권리가 있음을 확인한다”는 문구가 나온다.실제 회사나 이전 회사 이름으로 만들면 애매하지만, Yongtak Engineering Notes처럼 본인이 직접 만든 개인 기술 노트 페이지라면 본인이 관리 주체이므로 진행할 수 있다고 판단했다.네 번째는 앱 로고 조건이었다.LinkedIn Developer 앱은 유효한 app logo를 요구했다.기존 이미지가 조건에 안 맞을 수 있어서 300x300 PNG를 별도로 만들었다.이런 로고는 기능에는 중요하지 않지만, OAuth 동의 화면에 노출되므로 최소한 구분 가능한 형태가 필요했다.다섯 번째는 PowerShell 환경변수 입력이었다.처음에는 SetEnvironmentVariable에 값을 직접 넣으려다 쉼표 누락과 특수문자 때문에 문법 오류가 났다.그래서 테스트 단계에서는 사용자 환경변수에 저장하지 않고, 현재 PowerShell 세션에만 넣는 방식으로 바꿨다.$env:LINKEDIN_CLIENT_ID = Read-Host \"LinkedIn Client ID\"$env:LINKEDIN_CLIENT_SECRET = Read-Host \"LinkedIn Client Secret\"$env:LINKEDIN_REDIRECT_URI = \"http://localhost:3000/callback\"이 방식은 창을 닫으면 사라지므로 테스트에 적합하고, Client Secret을 평문 사용자 환경변수에 남기지 않아도 된다.여섯 번째는 authorization code 복사 방식이었다.callback URL 전체를 넣거나 code=까지 같이 넣으면 token exchange가 실패한다.실행해야 하는 값은 오직 code 값 자체다.http://localhost:3000/callback?code=AQ...&amp;state=...위 URL이라면 실행은 이렇게 해야 한다.npm run auth:exchange -- \"AQ...\"code=나 &amp;state=...는 넣지 않는다.일곱 번째는 Client Secret 노출 대응이었다.테스트 중 secret이 채팅에 노출될 수 있다는 점도 확인했다.이 경우 LinkedIn Developer 앱의 Generate a new Client Secret으로 새 secret을 만들고, 기존 노출 값을 폐기해야 한다.오류 메시지별 대응이번 작업에서 실제로 마주친 오류와 대응은 다음과 같다.            오류/증상      발생한 이유      대응                  Missing LinkedIn config: LINKEDIN_CLIENT_ID, LINKEDIN_CLIENT_SECRET      현재 PowerShell 세션에 LinkedIn 앱 설정이 없다. $env:로 넣은 값은 새 창에서 유지되지 않는다.      같은 PowerShell 창에서 Read-Host로 다시 입력하거나, User 환경변수로 저장한 뒤 새 창을 연다.              Missing ')' in method call / Unexpected token 'User'      PowerShell SetEnvironmentVariable() 호출에서 쉼표가 빠졌거나 따옴표가 깨졌다.      테스트 단계에서는 SetEnvironmentVariable 대신 $env:LINKEDIN_CLIENT_ID = Read-Host ... 방식을 쓴다.              Bummer, something went wrong. In five seconds, you will be redirected to: localhost      LinkedIn이 localhost callback으로 redirect하려는데 받을 로컬 서버가 없어서 브라우저가 실패처럼 보인다.      node -e \"http=require('http');http.createServer((q,s)=&gt;{console.log(q.url);s.end('OK')}).listen(3000)\"로 임시 callback 서버를 띄운다.              SyntaxError: Invalid or unexpected token      node -e 명령을 PowerShell에 여러 줄로 붙여넣어 JavaScript 문자열이 중간에서 끊겼다.      짧은 한 줄 명령으로 실행한다. PowerShell 프롬프트가 &gt;&gt;로 바뀌면 줄이 깨진 것이다.              Unable to retrieve access token: authorization code not found      code 값을 잘못 복사했거나, 이미 사용한 authorization code를 다시 썼거나, 시간이 지나 만료됐다.      OAuth URL을 다시 생성하고 새 code를 즉시 교환한다. code=와 &amp;state=는 빼고 값만 넣는다.              ACCESS_DENIED: Not enough permissions to access: partnerApiPostsExternal.FINDER-author      OAuth 로그인과 토큰 발급은 성공했지만, 앱에 Posts Finder API 조회 권한이 없다.      r_member_social을 포함해 다시 인증해본다. 그래도 같으면 LinkedIn 앱 권한/심사 영역이라 수동 샘플 기반으로 톤 분석한다.              Please upload a valid app logo      앱 로고 파일이 LinkedIn 조건에 맞지 않거나 미리보기 가능한 이미지가 아니다.      300x300 PNG/JPG를 새로 만들어 업로드한다.              앱 이름에 LinkedIn을 넣을 수 없음      LinkedIn Developer 앱 이름에 LinkedIn 브랜드 단어 사용이 제한된다.      Yongtak AI Workflow, Yongtak Workflow Tools처럼 바꾼다.              연결된 단체 페이지가 필수로 나옴      Showcase page 생성 화면에 들어간 경우다. Showcase는 기존 회사 페이지의 하위 페이지다.      뒤로 가서 회사 유형의 일반 Company Page를 만든다. URL이 linkedin.com/company/...인지 확인한다.      이 표를 남기는 이유는 간단하다.OAuth 문제는 대부분 “권한이 없다”로 뭉뚱그려 보이지만, 실제로는 설정 누락, redirect 서버 부재, code 복사 실수, API 권한 부족이 전부 다른 문제다.각 단계의 오류를 분리해서 봐야 시간을 덜 버린다.이후 OAuth redirect URL을 아래처럼 등록했다.http://localhost:3000/callback초기에는 callback을 받을 로컬 서버가 없어서 브라우저에 Bummer, something went wrong. 메시지가 보였다.하지만 이것은 OAuth가 완전히 실패했다기보다, LinkedIn이 localhost로 redirect하려는데 받을 서버가 없어서 생긴 혼란이었다.간단한 Node HTTP 서버를 띄우고 다시 시도하니 callback code를 받을 수 있었다.node -e \"http=require('http');http.createServer((q,s)=&gt;{console.log(q.url);s.end('OK')}).listen(3000)\"그 다음 authorization code를 access token으로 교환하는 것까지는 성공했다.막힌 지점문제는 기존 게시글 조회였다.posts:me를 실행하면 다음 에러가 반환됐다.LinkedIn API 403:ACCESS_DENIEDNot enough permissions to access: partnerApiPostsExternal.FINDER-author즉 OAuth 인증 자체는 성공했지만, 이 앱이 Posts Finder API로 본인 게시글을 읽을 권한은 없었다.r_member_social을 scope에 포함해 다시 인증해도 결과는 같았다.이후 공식 FAQ를 다시 확인하니 결론은 더 명확했다.LinkedIn Marketing API FAQ는 r_member_social을 closed permission으로 설명하고, 현재 resource constraint 때문에 access request를 받지 않는다고 안내한다.즉 이 문제는 구현 문법이나 OAuth callback 처리가 아니라, 현재 앱에 발급 가능한 권한의 경계였다.  Sign In with LinkedIn using OpenID Connect: 로그인과 기본 프로필 확인  Share on LinkedIn: w_member_social, 글 작성 권한  Community Management API / Posts API: 게시글 조회와 관리 영역  r_member_social: 개인 게시글 조회에 필요한 권한이지만 closed/restricted결론LinkedIn API는 존재하지만, 개인 개발자 앱에서 기존 게시글 조회가 GitHub처럼 바로 열리는 구조는 아니었다.이번 확인으로 나눈 결론은 다음과 같다.  로그인/OIDC 인증은 가능하다.  토큰 발급도 가능하다.  향후 승인된 범위 안에서 게시 워크플로를 만드는 것은 가능하다.  하지만 기존 게시글 조회는 별도 권한 승인 없이 바로 되지 않았다.  공식 FAQ 기준으로 r_member_social은 closed permission이므로, 개인 개발자 앱에서 기존 개인 글을 바로 읽는 경로로 기대하면 안 된다.  따라서 “기존 LinkedIn 글을 읽어 톤을 분석”하는 작업은 당장은 수동 샘플 기반이 현실적이다.앞으로의 규칙LinkedIn 자동화는 다음 기준으로 다룬다.  브라우저 쿠키, 내부 API, 스크래핑, DM 자동화는 사용하지 않는다.  공식 OAuth와 문서화된 API만 사용한다.  기존 글 조회가 필요하면 r_member_social 또는 Posts Finder 권한이 실제로 승인됐는지 먼저 확인한다.  권한이 없으면 사용자가 기존 글 2~3개를 직접 제공하고, 그 샘플을 기반으로 톤을 맞춘다.  Client Secret, authorization code, access token은 채팅과 저장소에 남기지 않는다.이번 삽질의 핵심은 이것이었다.API가 있다는 것과, 내가 원하는 작업을 지금 내 앱 권한으로 할 수 있다는 것은 다르다.",
        "url": "/linkedin-api-permission-check"
    }

    "jekyll-dependabot-cleanup": {
        "title": "오래된 Jekyll 블로그의 Dependabot 취약점 33개를 정리한 기록",
            "author": "ytkim4558",
            "category": "",
            "content": "codex-resume 작업을 포트폴리오와 블로그에 반영하는 과정에서 GitHub push 메시지에 Dependabot 경고가 같이 떴다.처음에는 단순한 경고처럼 보였지만, 실제로 확인해 보니 오래된 Jekyll 블로그 의존성에서 열린 취약점 알림이 여러 개 쌓여 있었다.이 글은 그 취약점을 무작정 최신화하지 않고, 사이트가 계속 빌드되는지 검증하면서 정리한 기록이다.문제를 발견한 위치블로그는 두 개의 저장소로 나뉘어 있었다.  GitHubPageMaker: Jekyll 소스 저장소  ytkim4558.github.io: 실제 GitHub Pages에 올라가는 생성 결과물 저장소처음에는 ytkim4558.github.io만 보면 되는 줄 알았지만, 실제 수정해야 할 곳은 Jekyll 소스가 있는 GitHubPageMaker였다.생성된 HTML만 직접 고치면 다음 빌드 때 다시 덮어써질 수 있기 때문이다.그래서 작업 기준을 다음처럼 정했다.  소스 변경은 GitHubPageMaker에서 한다.  Jekyll로 output/을 생성한다.  생성 결과를 ytkim4558.github.io에 반영한다.  공개 URL에서 실제 반영 여부를 확인한다.첫 번째 원인: jekyll-tasksDependabot 알림 중 가장 먼저 정리한 것은 npm 패키지 jekyll-tasks였다.이 패키지는 특정 버전만 취약한 것이 아니라 패키지 자체가 malware로 표시되어 있었다.다행히 현재 블로그 빌드에는 이 패키지가 필요하지 않았다.  package.json에는 들어 있었다.  하지만 실제 Jekyll 빌드는 npm이 아니라 bundle exec jekyll build로 수행했다.  gulpfile.js에서도 require('jekyll-tasks')로 사용하지 않았다.그래서 이 패키지는 제거했다.\"dependencies\": {  \"gulp\": \"github:gulpjs/gulp\"}제거 후 바로 배포하지 않고, Jekyll 빌드가 그대로 성공하는지 먼저 확인했다.두 번째 원인: 오래된 GitHub Pages 런타임Ruby 쪽 알림은 대부분 오래된 github-pages gem에서 시작됐다.기존 설정은 다음과 같았다.gem \"jekyll\", \"~&gt; 3.6.2\"gem \"github-pages\", \"~&gt; 168\"gem \"rake\", \"~&gt; 12.3.0\"이 조합은 nokogiri, addressable, activesupport, tzinfo, faraday 같은 오래된 하위 의존성을 끌고 왔다.Dependabot 알림도 대부분 이 하위 의존성에서 발생했다.처음에는 github-pages만 최신 계열로 올려도 충분할 것이라고 봤다.gem \"github-pages\", \"~&gt; 232\"하지만 이 상태에서는 nokogiri 1.18.10이 설치되어, 최신 nokogiri &lt; 1.19.3 알림이 남을 수 있었다.그래서 GitHub Pages 제약 범위 안에서 nokogiri를 명시적으로 올렸다.gem \"github-pages\", \"~&gt; 232\"gem \"nokogiri\", \"&gt;= 1.19.3\"왜 Docker로 검증했나Windows 로컬 환경에는 Ruby, Bundler, Jekyll이 설치되어 있지 않았다.새로 Ruby를 설치하는 대신 Docker로 빌드 환경을 고정했다.초기에는 jekyll/jekyll:3.8 이미지를 사용했지만, 최신 nokogiri 1.19.3은 Ruby 3.2 이상이 필요했다.그래서 최종 검증은 Ruby 3.2 컨테이너에서 진행했다.docker run --rm `  -v jekyll_bundle_232_ruby32_bundler269:/usr/local/bundle `  -v \"C:\\Users\\ytkim\\projects\\GitHubPageMaker:/srv/jekyll\" `  -w /srv/jekyll `  ruby:3.2 `  bash -lc \"gem install bundler -v 2.6.9 &amp;&amp; bundle _2.6.9_ update github-pages nokogiri &amp;&amp; bundle _2.6.9_ exec jekyll build --future\"여기서 --future를 붙인 이유는 같은 날 작성한 글이 컨테이너 시간대 기준으로 future post로 판단되어 빌드에서 빠질 수 있었기 때문이다.확인한 것업데이트 후에는 다음을 확인했다.  Jekyll 빌드 성공  포트폴리오 페이지 정상 생성  codex-resume 글 정상 생성  AI Workflow 태그 페이지 정상 생성  기존 상단 메뉴가 새 메뉴로 유지됨  GitHub Dependabot API 기준 open alert 0개  공개 URL 응답 200 OK최종적으로 확인한 핵심 URL은 다음과 같다.  https://ytkim4558.github.io/portfolio/  https://ytkim4558.github.io/codex-resume-tui-decision  https://ytkim4558.github.io/tag/ai-workflow/정리이번 작업의 핵심은 단순히 bundle update를 실행한 것이 아니었다.오래된 블로그는 의존성만 올리면 깨질 수 있기 때문에, 다음 순서가 중요했다.  실제로 쓰지 않는 malware 패키지부터 제거  Jekyll 소스 저장소와 생성 결과물 저장소를 분리해서 확인  Docker로 빌드 환경 고정  GitHub Pages 런타임 업데이트  취약 하위 의존성인 nokogiri를 패치 버전으로 고정  생성 결과를 공개 페이지에서 검증결과적으로 오래된 Jekyll 블로그를 유지하면서도, GitHub Dependabot 경고를 0개로 줄일 수 있었다.이런 작업은 눈에 띄는 기능 개발은 아니지만, 운영 중인 개인 사이트를 계속 신뢰 가능한 상태로 유지하는 데 필요한 기본 작업이다.다른 AI 에이전트에게 남기는 메모이 블로그를 다음에 수정하는 AI 에이전트는 ytkim4558.github.io의 HTML을 바로 고치는 대신, 먼저 GitHubPageMaker 소스를 수정해야 한다.  소스 repo: C:\\Users\\ytkim\\projects\\GitHubPageMaker  배포 repo: C:\\Users\\ytkim\\projects\\ytkim4558.github.io  빌드는 Ruby 3.2 Docker 컨테이너와 Bundler 2.6.9 기준으로 한다.  같은 날 작성한 글이 빠지지 않도록 jekyll build --future를 사용한다.  jekyll-tasks는 malware 알림 원인이므로 다시 추가하지 않는다.  github-pages ~&gt; 232, nokogiri &gt;= 1.19.3 제약을 유지한다.자세한 절차는 저장소 루트의 AGENTS.md에 남겨두는 것이 좋다.",

    "claude-resume-troubleshooting": {
        "title": "claude-resume TUI를 만들며 마주친 우여곡절 — 인코딩, 키 충돌, 재귀 호출, 스크린샷 모자이크",
            "author": "ytkim4558",
            "category": "",
            "content": "claude-resume는 Claude Code의 기본 claude --resume 화면을 대체하기 위해 직접 만든 TUI 도구다.기본 화면은 세션 ID와 시각만 보여주는데, 세션이 쌓이면 “이 ID가 어떤 작업이었지” 가 한눈에 안 들어온다.첫 메시지 한 줄 미리보기조차 없어서 매번 ID를 일일이 클릭해 확인해야 했다.해결은 단순했다. 좌측에는 세션 리스트 + 백그라운드 LLM 요약, 우측에는 선택한 세션의 전체 대화 — 두 패널 TUI.말로는 간단하지만 만드는 동안 마주친 결정과 실수가 적지 않았다. 이 글은 그 우여곡절의 기록이다.핵심 결정 4가지1. 요약은 별도 API 키가 아니라 claude -p subprocess로처음엔 Anthropic API 직접 호출(별도 API 키 + 종량제)을 검토했지만 다음 이유로 기각했다.  별도 결제 발생 (Claude Code Pro 구독비는 API 호출에 안 쓰임)  API 키 보안 관리 부담 (keyring 등 추가 셋업 필요)  호출 빈도가 낮아서 claude -p 의 6초 지연을 백그라운드 스레드로 흡수 가능결과적으로 Pro 구독만으로 동작, 사용자가 추가 설정할 게 없다.2. 정렬용 timestamp는 파일 mtime이 아니라 JSONL 내부 시각세션 정렬·표시용 “마지막 활동” 시각은 JSONL 파일의 mtime이 아니라 파일 안의 마지막 user/assistant 메시지의 timestamp 필드를 쓴다.이유는 사용자 요청이 명확했다 — “LLM 돌렷다고 그 날짜 갱신시키지 말고”. 캐시 파일이나 다른 도구가 파일을 건드려도 정렬 순서가 흔들리지 않아야 한다.3. 재귀 호출 방어 — 프롬프트 마커claude -p \"요약해줘 ...\" 호출이 그 자체로 새 Claude Code 세션을 만든다.즉 다음번 피커 실행 시 그 요약 호출 세션이 또 피커에 뜨고, 그걸 또 요약하려 하고… 무한 증식.해결: 요약 프롬프트 첫 줄에 &lt;&lt;CLAUDE-RESUME-SUMMARY-V1&gt;&gt; 마커를 박고, 세션의 첫 user 메시지에 이 마커가 있으면 리스트에서 제외했다.레거시(마커 없던 시절) 세션도 프롬프트 접두사 매칭으로 함께 필터했다.4. CMD / PowerShell 양쪽에서 동일 명령어로 호출처음엔 PowerShell $PROFILE 함수만 등록했는데 사용자가 곧장 CMD 에서 띄워보고 안 잡힌다고 알려줬다.결국 세 가지 entrypoint를 함께 둬야 했다.  claude-resume.py — 실제 TUI (Textual)  claude-resume.ps1 — PowerShell 래퍼 (인코딩 강제, 환경변수, 핸드오프)  claude-resume.cmd — CMD 호환 shim (.ps1을 -NoProfile -ExecutionPolicy Bypass로 호출)~/.claude/scripts/를 PATH에 추가하면 어느 셸에서든 claude-resume이 동작한다.우여곡절 — 실제로 깨졌던 것들한글 인코딩 (PowerShell ↔ subprocess)증상: claude -p에 한글 프롬프트 전달 시 ???로 깨짐.원인: PowerShell의 기본 stdin/stdout 인코딩이 UTF-16 LE 또는 OEM 코드페이지.파이프 한 번 거치면 마커 같은 ASCII는 살아남아도 한글은 다 죽었다.해결: PowerShell 래퍼에서 환경변수와 콘솔 인코딩을 명시.$env:PYTHONIOENCODING = 'utf-8'$env:PYTHONUTF8       = '1'[Console]::OutputEncoding = [System.Text.UTF8Encoding]::new()[Console]::InputEncoding  = [System.Text.UTF8Encoding]::new()Python 쪽에서는 subprocess.run([...], capture_output=True) 한 뒤 직접 .decode(\"utf-8\", errors=\"replace\") 로 디코딩.Textual ListView의 Enter 키가 안 먹음증상: 화살표로 항목 이동은 되는데 Enter를 눌러도 무반응.원인: 앱 레벨에 Binding(\"enter\", \"resume\", ...)를 걸어뒀더니 ListView 내장 Enter 핸들러(ListView.Selected 이벤트)를 가로채서 둘 다 무력화됐다.해결: 앱 레벨 Enter 바인딩을 제거하고 on_list_view_selected 이벤트 핸들러로 처리했다.백업으로 s 키도 같은 동작에 묶고, on_mount에서 lv.focus()를 명시해 시작 직후부터 화살표가 잡히도록 했다.Windows CMD에서 한글이 다른 폰트로 보임증상: TUI를 띄우면 한글이 영문 폰트와 다른 폰트로 보여서 어색했다.원인: 터미널 기본 모노스페이스 폰트(Cascadia Mono 등)에 한글 글리프가 없어서 Windows가 맑은 고딕 같은 폰트로 자동 fallback.래퍼에서 chcp 65001로 코드페이지를 UTF-8로 바꿔도 폰트 fallback은 별개 문제였다.해결책 (사용자 안내): Windows Terminal + D2Coding / Sarasa Mono K 같은 CJK 통합 코딩 폰트로 변경.이건 도구가 풀 수 있는 문제가 아니라서 README에 권장 폰트를 명시했다.세션 핸드오프 — TUI가 stdout을 점유Textual은 화면 렌더링에 stdout을 점유한다.즉 사용자가 세션을 고르면 stdout으로 ID를 print해서 부모 셸이 받아 claude --resume &lt;id&gt;를 실행하는 패턴이 안 통한다.해결: 선택된 ID를 ~/.claude/.resume-target 임시 파일에 쓰고 TUI 종료, PowerShell 래퍼가 그 파일을 읽어 claude --resume &lt;id&gt;를 실행하는 식으로 우회.데모 스크린샷 모자이크 — 좌표 계속 어긋남블로그/포트폴리오에 쓸 데모 이미지에 다른 세션 미리보기가 그대로 노출돼 있어서 좌측 패널 일부를 가려야 했다.PIL로 Gaussian blur + 반투명 overlay를 얹는 식으로 처리했는데, 처음엔 좌표가 자꾸 어긋났다.문제: 미리 보기 렌더링이 다운스케일된 이미지라 내가 보는 박스 위치와 실제 픽셀 좌표가 달랐다.원본 픽셀 기준으로 좌표를 다시 계산하고, 단순 blur 위에 솔리드 overlay까지 얹어 잔상 텍스트가 새어 나오지 않도록 강화했다.crop = img.crop((x1, y1, x2, y2))img.paste(crop.filter(ImageFilter.GaussianBlur(radius=20)), (x1, y1))overlay = Image.new('RGBA', (x2 - x1, y2 - y1), (50, 50, 60, 215))img.paste(overlay, (x1, y1), overlay)공개용 이미지에는 항상 검증 단계가 한 번 더 필요하다는 걸 다시 확인했다.결론 — 세션 picker가 아니라 작업 기억 브라우저만들고 보니 claude-resume의 핵심은 ID나 시각이 아니라 “무슨 작업이었지?”를 빠르게 떠올리게 하는 것이었다.LLM 요약 + 두 패널 구조 + 안정적인 키보드 조작 + 한글이 깨지지 않는 인코딩, 이 네 가지가 갖춰져야 도구로서 의미가 있었다.codex-resume에서도 같은 결론에 도달한 흐름은 별도 글에 정리돼 있다.다음 과제  --all 옵션 — 현재 디렉터리 외 다른 프로젝트 세션도 묶어서 표시  키워드 검색 (/로 시작) — Textual 내 inline filter  세션 삭제 (d 키) — JSONL과 캐시 항목 동시 제거, 확인 프롬프트  요약 모델 옵션화 — claude -p 대신 OpenAI/Gemini 등 선택 가능  macOS / Linux 래퍼 — .sh 버전 (Python 본체는 이미 크로스플랫폼)다른 AI 에이전트에게 남기는 메모이 작업을 이어받는 AI 에이전트는 claude-resume을 단순 세션 ID picker로 보지 말고 AI 작업 히스토리 브라우저로 보면 된다.  두 패널 TUI 구조 (좌 리스트 / 우 전체 대화) 유지.  요약은 claude -p subprocess로 백그라운드 생성·캐시. 별도 API 키를 강제하지 않는다.  정렬용 시각은 항상 JSONL 내부 message timestamp 기준. 파일 mtime 기준으로 바꾸지 말 것.  요약 호출 자체가 새 세션을 만들기 때문에 프롬프트 마커로 반드시 자기 호출을 필터한다.  CMD/PowerShell 양쪽 진입점 (claude-resume.cmd, claude-resume.ps1)을 함께 유지한다.  한글 인코딩은 PowerShell 래퍼에서 강제 (PYTHONIOENCODING, PYTHONUTF8, [Console]::*Encoding).  공개용 스크린샷은 원본 픽셀 좌표 기준으로 다시 검증한 뒤 redact. 다운스케일된 미리 보기 좌표로 판단하지 말 것.  상세 설계 문서는 claude-toolkit에 있다.",
        "url": "/claude-resume-troubleshooting"

    "codex-resume-tui-decision": {
        "title": "codex-resume TUI를 만들면서 외부 TUI 라이브러리를 쓰기로 바꾼 이유",
            "author": "ytkim4558",
            "category": "",
            "content": "codex-resume는 OpenAI Codex CLI의 로컬 세션 로그를 검색하고,필요한 세션을 골라 codex resume &lt;session-id&gt;로 이어가기 위한 Windows 친화형 TUI 도구다.처음에는 외부 의존성을 거의 쓰지 않고 Node.js 기본 모듈만으로 구현했다.빠르게 동작하고 설치가 단순하다는 장점은 있었지만, 실제 화면을 보고 나니 방향을 바꿔야 했다.이 글은 그 의사결정 기록이다.위 화면은 초기 codex-resume의 raw TUI다.기능적으로는 세션을 찾고 이어갈 수 있었지만, 메뉴 정보가 직관적이지 않았고 한글·긴 경로·긴 요청이 섞일 때 화면이 쉽게 깨졌다.첫 구현처음 구현한 기능은 다음과 같았다.  %USERPROFILE%\\.codex\\sessions 아래 JSONL 로그 스캔  session_meta, user_message, response_item, event_msg 파싱  첫 사용자 메시지와 마지막 assistant 메시지로 preview 생성  codex resume &lt;session-id&gt;로 handoff  PowerShell/CMD wrapper 제공이 접근은 빠르게 동작하는 장점이 있었다.설치가 거의 필요 없고, 실제 Codex 세션을 읽어 list, doctor, index, resume 명령을 바로 검증할 수 있었다.하지만 PowerShell에서 직접 실행한 화면을 캡처해서 보니 문제가 분명해졌다.실제 화면에서 보인 문제첫 번째 문제는 표시 폭 계산이었다.한글, 긴 경로, 이미지 파일명, 긴 사용자 요청이 섞이자 좌우 구분선과 텍스트가 겹쳤다.문자열 길이와 터미널 표시 폭이 다르기 때문에 단순 length 기준으로는 안정적인 레이아웃을 만들기 어렵다.두 번째 문제는 세션 의미 파악이 어렵다는 점이었다.첫 사용자 메시지와 마지막 응답을 그냥 잘라 보여주면, 결국 raw 로그를 조금 예쁘게 보여주는 정도에 그친다.claude-resume에서 좋았던 것은 raw preview가 아니라 LLM이 요약한 “이 세션의 의미”였다.세 번째 문제는 TUI 상호작용의 완성도였다.스크롤, 포커스, 선택 상태, 검색 입력, 상세 패널 표시 같은 요소는 직접 만들 수는 있지만, 계속 보수해야 한다.처음부터 도구의 핵심이 TUI라면 검증된 TUI 라이브러리를 쓰는 편이 맞다.비교 기준: claude-resume에서 좋았던 점비교 기준으로 삼은 것은 이전에 만든 claude-resume였다.Claude Code의 기본 resume 화면은 세션 ID와 시간 중심이라 대화가 많아지면 찾기가 어렵다.그래서 claude-resume에서는 Python Textual로 두 패널 TUI를 만들고, 백그라운드에서 claude -p를 호출해 각 세션을 한 줄로 요약하게 했다.이 화면은 codex-resume 글의 주인공이 아니라 비교 대상이다.좋았던 점은 명확했다.  세션 ID가 아니라 “무슨 일을 하던 대화였는지”를 기준으로 찾을 수 있다.  긴 JSONL 로그를 직접 열어보지 않아도 된다.  요약은 캐시되므로 다음 실행부터 빠르게 볼 수 있다.  UI가 두 패널로 나뉘어 있어 목록과 상세 내용을 동시에 비교할 수 있다.결론: 외부 TUI 라이브러리는 필요하다처음에는 dependency-free 구현이 더 단순하고 배포하기 쉽다고 봤다.하지만 실제 화면을 보고 판단이 바뀌었다.codex-resume는 단순 CLI가 아니라 과거 AI 작업 히스토리를 찾는 브라우저다.그렇다면 화면 품질은 부가 기능이 아니라 핵심 기능이다.그래서 기본 UI는 Node.js TUI 라이브러리인 blessed 기반으로 바꾸고, 기존 의존성 없는 picker는 fallback으로 남기는 방향으로 수정했다.이 결정은 claude-resume에서 Textual을 사용한 이유와 같다.  목록과 상세를 안정적으로 분리하기 위해  키보드 이동, 스크롤, 포커스 상태를 직접 유지보수하지 않기 위해  세션 요약을 중심에 둔 UI를 만들기 위해  Windows Terminal / PowerShell에서 실제로 보기 좋은 도구로 만들기 위해다음 과제codex-resume의 다음 단계는 claude-resume처럼 LLM 요약 캐시를 붙이는 것이다.Codex 세션 로그는 ~/.codex/sessions/YYYY/MM/DD/*.jsonl 형태로 저장되어 있고, 실제 대화는 user_message, response_item, event_msg 안에 들어 있다.이 내용을 요약 provider에 넘기고, 결과를 %USERPROFILE%\\.codex\\codex-resume\\session-index.json 또는 별도 summary cache에 저장하면 된다.요약 provider는 처음부터 하나로 고정하지 않는 편이 좋다.  OpenAI API를 쓰는 방식  Codex CLI가 제공하는 비대화형 호출을 쓰는 방식  사용자가 이미 가진 다른 LLM CLI를 쓰는 방식  요약 없이 heuristic summary만 쓰는 fallback중요한 것은 요약 자체보다도, 사용자가 “그때 무슨 작업을 하던 세션이지?”를 바로 알 수 있게 만드는 것이다.claude-resume에서 얻은 교훈은 결국 이거였다.세션 복구 도구의 본질은 ID를 보여주는 것이 아니라, 작업 기억을 다시 찾게 해주는 것이다.다른 AI 에이전트에게 남기는 메모이 작업을 이어받는 AI 에이전트는 codex-resume를 단순 세션 ID picker로 보지 말고, AI 작업 히스토리 브라우저로 봐야 한다.  기본 TUI는 blessed 기반 split-pane 구조를 유지한다.  dependency-free picker는 fallback으로만 둔다.  다음 핵심 작업은 LLM 요약 캐시다.  공개용 스크린샷은 반드시 민감한 세션명, 로컬 경로, 개인 파일명을 가린다.  관련 문서는 claude-toolkit과 GitHubPageMaker의 AI Workflow 글에 같이 남긴다.",

        if (!targets.length || window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
        targets.forEach(function(target) {

    <script>
      (function() {
        var assistant = document.querySelector('.profile-assistant');
        if (!assistant) return;

        var input = assistant.querySelector('#profile-question');
        var answer = assistant.querySelector('.profile-assistant-answer');
        var submit = assistant.querySelector('.profile-assistant-submit');
        var profileAssistantApi = ''.trim().replace(/\/$/, '');
        var facts = {
          openSearch: '김용탁은 AWS Cloud Support Engineer이자 OpenSearch SME입니다. 고객의 OpenSearch 이슈, 분석 워크로드, 운영 문제, 에스컬레이션 흐름을 다루며 troubleshooting과 기술 커뮤니케이션을 중심으로 일합니다.',
          aiWorkflow: 'AI workflow 쪽에서는 MCP로 Slack, Outlook, wiki, ticket search, local tools를 연결하고, support-agent persona, 공식 URL 검증, 유사 문서/티켓 검색, 답변 검증, 이슈 재현, case aging triage, Slack bot follow-up 흐름을 설계했습니다.',
          projects: '대표 작업물은 claude-resume, codex-resume, linkedin-posting-mcp, 그리고 이 Engineering Notes 사이트입니다. claude-resume/codex-resume은 AI coding agent 세션을 찾고 이어가기 위한 TUI 도구입니다.',
          profile: '김용탁은 모바일 앱과 백엔드 개발에서 시작해 데이터 플랫폼과 AWS Analytics Support로 확장했고, 현재는 OpenSearch SME 경험과 AI 지원 자동화 워크플로를 결합해 반복되는 문제를 도구화하는 데 집중합니다.'
        };

        function respond(question) {
          var q = (question || '').toLowerCase();
          if (!q.trim()) return '질문을 입력해 주세요.';
          if (q.includes('opensearch') || q.includes('aws') || q.includes('support') || q.includes('서포트')) return facts.openSearch;
          if (q.includes('mcp') || q.includes('ai') || q.includes('workflow') || q.includes('워크플로') || q.includes('slack') || q.includes('자동화')) return facts.aiWorkflow;
          if (q.includes('project') || q.includes('프로젝트') || q.includes('대표') || q.includes('도구') || q.includes('tool')) return facts.projects;
          return facts.profile;
        }

        async function askProfile(question) {
          var fallback = respond(question);
          if (!profileAssistantApi) {
            answer.textContent = fallback;
            return;
          }

          answer.textContent = '공개 프로필 문맥을 기준으로 답변을 생성하는 중입니다...';
          submit.disabled = true;

          try {
            var response = await fetch(profileAssistantApi + '/ask-profile', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ question: question })
            });
            var data = await response.json();
            if (!response.ok || !data.answer) throw new Error(data.error || 'profile_assistant_error');
            answer.textContent = data.answer;
          } catch (error) {
            answer.textContent = fallback + '\n\n현재 실시간 AI 답변 서버에 연결할 수 없어 정적 프로필 답변으로 표시했습니다.';
          } finally {
            submit.disabled = false;
          }
        }

        assistant.querySelectorAll('[data-profile-question]').forEach(function(button) {
          button.addEventListener('click', function() {
            input.value = button.getAttribute('data-profile-question') || '';
            askProfile(input.value);
          });
        });

        submit.addEventListener('click', function() {
          askProfile(input.value);
        });
      })();
    </script>
