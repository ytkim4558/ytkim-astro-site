    "jekyll-dependabot-cleanup": {
        "title": "오래된 Jekyll 블로그의 Dependabot 취약점 33개를 정리한 기록",
            "author": "ytkim4558",
            "category": "",
            "content": "codex-resume 작업을 포트폴리오와 블로그에 반영하는 과정에서 GitHub push 메시지에 Dependabot 경고가 같이 떴다.처음에는 단순한 경고처럼 보였지만, 실제로 확인해 보니 오래된 Jekyll 블로그 의존성에서 열린 취약점 알림이 여러 개 쌓여 있었다.이 글은 그 취약점을 무작정 최신화하지 않고, 사이트가 계속 빌드되는지 검증하면서 정리한 기록이다.문제를 발견한 위치블로그는 두 개의 저장소로 나뉘어 있었다.  GitHubPageMaker: Jekyll 소스 저장소  ytkim4558.github.io: 실제 GitHub Pages에 올라가는 생성 결과물 저장소처음에는 ytkim4558.github.io만 보면 되는 줄 알았지만, 실제 수정해야 할 곳은 Jekyll 소스가 있는 GitHubPageMaker였다.생성된 HTML만 직접 고치면 다음 빌드 때 다시 덮어써질 수 있기 때문이다.그래서 작업 기준을 다음처럼 정했다.  소스 변경은 GitHubPageMaker에서 한다.  Jekyll로 output/을 생성한다.  생성 결과를 ytkim4558.github.io에 반영한다.  공개 URL에서 실제 반영 여부를 확인한다.첫 번째 원인: jekyll-tasksDependabot 알림 중 가장 먼저 정리한 것은 npm 패키지 jekyll-tasks였다.이 패키지는 특정 버전만 취약한 것이 아니라 패키지 자체가 malware로 표시되어 있었다.다행히 현재 블로그 빌드에는 이 패키지가 필요하지 않았다.  package.json에는 들어 있었다.  하지만 실제 Jekyll 빌드는 npm이 아니라 bundle exec jekyll build로 수행했다.  gulpfile.js에서도 require('jekyll-tasks')로 사용하지 않았다.그래서 이 패키지는 제거했다.\"dependencies\": {  \"gulp\": \"github:gulpjs/gulp\"}제거 후 바로 배포하지 않고, Jekyll 빌드가 그대로 성공하는지 먼저 확인했다.두 번째 원인: 오래된 GitHub Pages 런타임Ruby 쪽 알림은 대부분 오래된 github-pages gem에서 시작됐다.기존 설정은 다음과 같았다.gem \"jekyll\", \"~&gt; 3.6.2\"gem \"github-pages\", \"~&gt; 168\"gem \"rake\", \"~&gt; 12.3.0\"이 조합은 nokogiri, addressable, activesupport, tzinfo, faraday 같은 오래된 하위 의존성을 끌고 왔다.Dependabot 알림도 대부분 이 하위 의존성에서 발생했다.처음에는 github-pages만 최신 계열로 올려도 충분할 것이라고 봤다.gem \"github-pages\", \"~&gt; 232\"하지만 이 상태에서는 nokogiri 1.18.10이 설치되어, 최신 nokogiri &lt; 1.19.3 알림이 남을 수 있었다.그래서 GitHub Pages 제약 범위 안에서 nokogiri를 명시적으로 올렸다.gem \"github-pages\", \"~&gt; 232\"gem \"nokogiri\", \"&gt;= 1.19.3\"왜 Docker로 검증했나Windows 로컬 환경에는 Ruby, Bundler, Jekyll이 설치되어 있지 않았다.새로 Ruby를 설치하는 대신 Docker로 빌드 환경을 고정했다.초기에는 jekyll/jekyll:3.8 이미지를 사용했지만, 최신 nokogiri 1.19.3은 Ruby 3.2 이상이 필요했다.그래서 최종 검증은 Ruby 3.2 컨테이너에서 진행했다.docker run --rm `  -v jekyll_bundle_232_ruby32_bundler269:/usr/local/bundle `  -v \"C:\\Users\\ytkim\\projects\\GitHubPageMaker:/srv/jekyll\" `  -w /srv/jekyll `  ruby:3.2 `  bash -lc \"gem install bundler -v 2.6.9 &amp;&amp; bundle _2.6.9_ update github-pages nokogiri &amp;&amp; bundle _2.6.9_ exec jekyll build --future\"여기서 --future를 붙인 이유는 같은 날 작성한 글이 컨테이너 시간대 기준으로 future post로 판단되어 빌드에서 빠질 수 있었기 때문이다.확인한 것업데이트 후에는 다음을 확인했다.  Jekyll 빌드 성공  포트폴리오 페이지 정상 생성  codex-resume 글 정상 생성  AI Workflow 태그 페이지 정상 생성  기존 상단 메뉴가 새 메뉴로 유지됨  GitHub Dependabot API 기준 open alert 0개  공개 URL 응답 200 OK최종적으로 확인한 핵심 URL은 다음과 같다.  https://ytkim4558.github.io/portfolio/  https://ytkim4558.github.io/codex-resume-tui-decision  https://ytkim4558.github.io/tag/ai-workflow/정리이번 작업의 핵심은 단순히 bundle update를 실행한 것이 아니었다.오래된 블로그는 의존성만 올리면 깨질 수 있기 때문에, 다음 순서가 중요했다.  실제로 쓰지 않는 malware 패키지부터 제거  Jekyll 소스 저장소와 생성 결과물 저장소를 분리해서 확인  Docker로 빌드 환경 고정  GitHub Pages 런타임 업데이트  취약 하위 의존성인 nokogiri를 패치 버전으로 고정  생성 결과를 공개 페이지에서 검증결과적으로 오래된 Jekyll 블로그를 유지하면서도, GitHub Dependabot 경고를 0개로 줄일 수 있었다.이런 작업은 눈에 띄는 기능 개발은 아니지만, 운영 중인 개인 사이트를 계속 신뢰 가능한 상태로 유지하는 데 필요한 기본 작업이다.다른 AI 에이전트에게 남기는 메모이 블로그를 다음에 수정하는 AI 에이전트는 ytkim4558.github.io의 HTML을 바로 고치는 대신, 먼저 GitHubPageMaker 소스를 수정해야 한다.  소스 repo: C:\\Users\\ytkim\\projects\\GitHubPageMaker  배포 repo: C:\\Users\\ytkim\\projects\\ytkim4558.github.io  빌드는 Ruby 3.2 Docker 컨테이너와 Bundler 2.6.9 기준으로 한다.  같은 날 작성한 글이 빠지지 않도록 jekyll build --future를 사용한다.  jekyll-tasks는 malware 알림 원인이므로 다시 추가하지 않는다.  github-pages ~&gt; 232, nokogiri &gt;= 1.19.3 제약을 유지한다.자세한 절차는 저장소 루트의 AGENTS.md에 남겨두는 것이 좋다.",
        "url": "/jekyll-dependabot-cleanup"
    }

    "codex-resume-tui-decision": {
        "title": "codex-resume TUI를 만들면서 외부 TUI 라이브러리를 쓰기로 바꾼 이유",
            "author": "ytkim4558",
            "category": "",
            "content": "claude-resume를 만들 때 가장 중요했던 기능은 단순히 과거 세션 목록을 보여주는 것이 아니었다.핵심은 예전 대화가 무슨 작업이었는지 LLM 요약으로 바로 알아보고, 필요한 세션으로 이어가는 것이었다.Claude Code의 기본 resume 화면은 세션 ID와 시간 중심이라 대화가 많아지면 찾기가 어렵다.그래서 claude-resume에서는 Python Textual로 두 패널 TUI를 만들고, 백그라운드에서 claude -p를 호출해 각 세션을 한 줄로 요약하게 했다.왼쪽에는 요약된 히스토리 목록을 두고, 오른쪽에는 선택한 세션의 전체 대화 내용을 보여주는 구조였다.위 화면처럼 왼쪽 목록은 단순 파일명이 아니라 “무슨 작업이었는지”를 보여주고, 오른쪽은 선택한 세션의 실제 대화 흐름을 바로 확인할 수 있게 했다.민감한 세션명은 공개용 이미지에서 일반화했지만, 핵심은 요약된 목록과 상세 대화가 동시에 보이는 구조다.이 방식이 좋았던 이유는 명확했다.  세션 ID가 아니라 “무슨 일을 하던 대화였는지”를 기준으로 찾을 수 있다.  긴 JSONL 로그를 직접 열어보지 않아도 된다.  요약은 캐시되므로 다음 실행부터 빠르게 볼 수 있다.  UI가 두 패널로 나뉘어 있어 목록과 상세 내용을 동시에 비교할 수 있다.codex-resume의 첫 구현OpenAI Codex CLI용으로 비슷한 도구인 codex-resume를 만들 때는 처음에 반대로 접근했다.외부 의존성을 최소화하고 Node.js 기본 모듈만으로 동작하는 MVP를 먼저 만들었다.처음 구현한 기능은 다음과 같았다.  %USERPROFILE%\\.codex\\sessions 아래 JSONL 로그 스캔  session_meta, user_message, response_item, event_msg 파싱  첫 사용자 메시지와 마지막 assistant 메시지로 preview 생성  codex resume &lt;session-id&gt;로 handoff  PowerShell/CMD wrapper 제공이 접근은 빠르게 동작하는 장점이 있었다.설치가 거의 필요 없고, 실제 Codex 세션을 읽어 list, doctor, index, resume 명령을 바로 검증할 수 있었다.하지만 실제 화면을 캡처해서 보니 문제가 분명해졌다.실제 화면에서 보인 문제PowerShell에서 직접 실행한 화면은 기능적으로는 동작했지만, 도구라고 부르기엔 부족했다.첫 번째 문제는 표시 폭 계산이었다.한글, 긴 경로, 이미지 파일명, 긴 사용자 요청이 섞이자 좌우 구분선과 텍스트가 겹쳤다.문자열 길이와 터미널 표시 폭이 다르기 때문에 단순 length 기준으로는 안정적인 레이아웃을 만들기 어렵다.두 번째 문제는 세션 의미 파악이 어렵다는 점이었다.첫 사용자 메시지와 마지막 응답을 그냥 잘라 보여주면, 결국 raw 로그를 조금 예쁘게 보여주는 정도에 그친다.claude-resume에서 좋았던 것은 raw preview가 아니라 LLM이 요약한 “이 세션의 의미”였다.세 번째 문제는 TUI 상호작용의 완성도였다.스크롤, 포커스, 선택 상태, 검색 입력, 상세 패널 표시 같은 요소는 직접 만들 수는 있지만, 계속 보수해야 한다.처음부터 도구의 핵심이 TUI라면 검증된 TUI 라이브러리를 쓰는 편이 맞다.결론: 외부 TUI 라이브러리는 필요하다처음에는 dependency-free 구현이 더 단순하고 배포하기 쉽다고 봤다.하지만 실제 화면을 보고 판단이 바뀌었다.codex-resume는 단순 CLI가 아니라 과거 AI 작업 히스토리를 찾는 브라우저다.그렇다면 화면 품질은 부가 기능이 아니라 핵심 기능이다.그래서 기본 UI는 Node.js TUI 라이브러리인 blessed 기반으로 바꾸고, 기존 의존성 없는 picker는 fallback으로 남기는 방향으로 수정했다.이 결정은 claude-resume에서 Textual을 사용한 이유와 같다.  목록과 상세를 안정적으로 분리하기 위해  키보드 이동, 스크롤, 포커스 상태를 직접 유지보수하지 않기 위해  세션 요약을 중심에 둔 UI를 만들기 위해  Windows Terminal / PowerShell에서 실제로 보기 좋은 도구로 만들기 위해다음 과제codex-resume의 다음 단계는 claude-resume처럼 LLM 요약 캐시를 붙이는 것이다.Codex 세션 로그는 ~/.codex/sessions/YYYY/MM/DD/*.jsonl 형태로 저장되어 있고, 실제 대화는 user_message, response_item, event_msg 안에 들어 있다.이 내용을 요약 provider에 넘기고, 결과를 %USERPROFILE%\\.codex\\codex-resume\\session-index.json 또는 별도 summary cache에 저장하면 된다.요약 provider는 처음부터 하나로 고정하지 않는 편이 좋다.  OpenAI API를 쓰는 방식  Codex CLI가 제공하는 비대화형 호출을 쓰는 방식  사용자가 이미 가진 다른 LLM CLI를 쓰는 방식  요약 없이 heuristic summary만 쓰는 fallback중요한 것은 요약 자체보다도, 사용자가 “그때 무슨 작업을 하던 세션이지?”를 바로 알 수 있게 만드는 것이다.claude-resume에서 얻은 교훈은 결국 이거였다.세션 복구 도구의 본질은 ID를 보여주는 것이 아니라, 작업 기억을 다시 찾게 해주는 것이다.다른 AI 에이전트에게 남기는 메모이 작업을 이어받는 AI 에이전트는 codex-resume를 단순 세션 ID picker로 보지 말고, AI 작업 히스토리 브라우저로 봐야 한다.  기본 TUI는 blessed 기반 split-pane 구조를 유지한다.  dependency-free picker는 fallback으로만 둔다.  다음 핵심 작업은 LLM 요약 캐시다.  공개용 스크린샷은 반드시 민감한 세션명, 로컬 경로, 개인 파일명을 가린다.  관련 문서는 claude-toolkit과 GitHubPageMaker의 AI Workflow 글에 같이 남긴다.",
