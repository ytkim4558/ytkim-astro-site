indows-terminal-crash-fix/"},{"title":"LinkedIn API로 기존 글을 읽어 톤을 맞추려다 확인한 것","description":"LinkedIn에 새 글을 올리기 전에 기존에 내가 썼던 글의 톤을 보고 맞추고 싶었다.","tags":["AI Workflow"],"url":"/linkedin-api-permission-check/"},{"title":"claude-resume TUI를 만들며 마주친 우여곡절 — 인코딩, 키 충돌, 재귀 호출, 스크린샷 모자이크","description":"claude-resume는 Claude Code의 기본 claude --resume 화면을 대체하기 위해 직접 만든 TUI 도구다.","tags":["AI Workflow"],"url":"/claude-resume-troubleshooting/"},{"title":"codex-resume TUI를 만들면서 외부 TUI 라이브러리를 쓰기로 바꾼 이유","description":"codex-resume는 OpenAI Codex CLI의 로컬 세션 로그를 검색하고,","tags":["AI Workflow"],"url":"/codex-resume-tui-decision/"},{"title":"오래된 Jekyll 블로그의 Dependabot 취약점 33개를 정리한 기록","description":"처음에는 단순한 경고처럼 보였지만, 실제로 확인해 보니 오래된 Jekyll 블로그 의존성에서 열린 취약점 알림이 여러 개 쌓여 있었다.","tags":["AI Workflow"],"url":"/jekyll-dependabot-cleanup/"},{"title":"안드로이드 스튜디오 레이아웃 preview에서 각국언어 버전 보기","description":"회사에서 개발하는 앱이 영어, 한국어 버전을 동시에 지원한다.","tags":["Android"],"url":"/android/"},{"title":"MySQL 일부 문자열 검색 기능 like","description":"회사에서 전화번호 뒷자리번호로 검색할 사용자를 검색할 필요가 있어 검색하는데 SQL 문이 기억이 안났다.","tags":["MySQL"],"url":"/mysql/"},{"title":"비공개 저장소를 이용한 fork를 사용하지 않은 PR 방법","description":"회사에서 깃 비공개 저장소를 이용하면서 브랜치를 만들고 PR을 만드는데 있어서, 어떤식으로 할 수 있는지 궁금했다.","tags":["Git"],"url":"/git/"},{"title":"Jekyll 드디어 검색 기능 수정하다.","description":"검색기능을 붙이는데 꽤 애먹었다.","tags":["Jekyll"],"url":"/jekyll/"}];

    const input = document.querySelector('#search-input');
    const results = document.querySelector('#search-results');
    const render = (items) => {
      results.innerHTML = items.map((post) => `
        <article class="post-list-item">
          <a href="${post.url}">
            <span>${post.tags.join(' · ')}</span>
            <strong>${post.title}</strong>
            <p>${post.description}</p>
          </a>
        </article>
      `).join('');
    };
    input.addEventListener('input', () => {
      const query = input.value.trim().toLowerCase();
      const filtered = query
        ? posts.filter((post) => [post.title, post.description, post.tags.join(' ')].join(' ').toLowerCase().includes(query))
        : posts;
      render(filtered);
    });
    render(posts);
  })();</script>  <footer class="site-footer">
